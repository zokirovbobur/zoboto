<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2436;--surface3:#242a3d;
  --border:#2a3148;--accent:#f5a623;--accent2:#3b82f6;--accent3:#10b981;
  --danger:#ef4444;--warn:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:10px;--nav:220px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--nav);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.nav-section{padding:12px 0}
.nav-label{font-size:10px;color:var(--text3);padding:4px 16px 6px;letter-spacing:1.5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent)}
.nav-item .icon{width:18px;text-align:center;font-size:15px}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-title{font-weight:700;font-size:15px;flex:1}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:320px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#e0951f}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface2)}
.btn-sm{padding:4px 10px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;letter-spacing:.5px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-trend{font-size:11px;font-weight:600;margin-top:4px}
.kpi-trend.up{color:var(--danger)}
.kpi-trend.down{color:var(--accent3)}
.kpi.accent .kpi-value{color:var(--accent)}
.kpi.blue .kpi-value{color:var(--accent2)}
.kpi.green .kpi-value{color:var(--accent3)}
.kpi.red .kpi-value{color:var(--danger)}
.kpi.yellow .kpi-value{color:var(--warn)}
.kpi.purple .kpi-value{color:#a78bfa}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);color:var(--text3);font-size:11px;font-weight:700;padding:8px 12px;text-align:left;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:var(--surface2)}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-red{background:#7f1d1d;color:#fca5a5}
.badge-yellow{background:#78350f;color:#fcd34d}
.badge-green{background:#064e3b;color:#6ee7b7}
.badge-blue{background:#1e3a5f;color:#93c5fd}
.badge-purple{background:#4c1d95;color:#c4b5fd}
.badge-gray{background:var(--surface3);color:var(--text3)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:10px 16px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:1100px;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;padding:20px;max-height:75vh}
.close-btn{margin-left:auto;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px}
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.sec-title{font-size:14px;font-weight:700}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.info-row{display:flex;flex-direction:column;gap:2px;padding:10px 8px;border-bottom:1px solid var(--border)}
.info-label{font-size:11px;color:var(--text3)}
.info-value{font-size:13px;font-weight:600}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;padding:6px 0}
.tl-line{display:flex;flex-direction:column;align-items:center;width:20px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}
.tl-connector{width:2px;flex:1;background:var(--border);margin-top:4px;min-height:20px}
.tl-content{flex:1;padding-bottom:8px}
.chat{display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-ai{background:var(--surface3);border:1px solid var(--border);align-self:flex-start;border-radius:4px 12px 12px 12px}
.chat-user{background:#1e3a5f;border:1px solid var(--accent2);align-self:flex-end;border-radius:12px 4px 12px 12px}
.chat-time{font-size:10px;color:var(--text3);margin-top:4px}
.date-input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

function Badge({type,children}){
  const m={red:"badge-red",yellow:"badge-yellow",green:"badge-green",blue:"badge-blue",purple:"badge-purple",gray:"badge-gray"};
  return <span className={`badge ${m[type]||"badge-gray"}`}>{children}</span>;
}
function StageBadge({stage}){
  const m={"Суд":["red","⚖"],"МИБ":["yellow","🏛"],"Аукцион":["purple","🔨"],"Боғланиш":["blue","📞"],"Янги":["gray","🆕"]};
  const[t,ic]=m[stage]||["gray","•"];
  return <Badge type={t}>{ic} {stage}</Badge>;
}

        <InfoRow label="Масъул юрист" value={c.lawyer}/>
      </div>
      <div style={{marginTop:16}}>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:8,fontWeight:600}}>ЖАРАЁН ТАРИХИ</div>
        <div className="timeline">
          {c.history.map((h,j)=>(
            <div key={j} className="tl-item">
              <div className="tl-line">
                <div className="tl-dot" style={{background:j===c.history.length-1?"var(--warn)":"var(--accent3)"}}/>
                {j<c.history.length-1&&<div className="tl-connector"/>}
              </div>
              <div className="tl-content">
                <div style={{fontSize:11,color:"var(--text3)"}}>{h.date}</div>
                <div style={{fontSize:13}}>{h.text}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <button className="btn btn-secondary btn-sm">📄 Ҳужжатлар</button>
        <button className="btn btn-secondary btn-sm">📝 Янги қарор киритиш</button>
      </div>
    </div>
  ))}</div>;
}

function TabMIB({b}){
  if(!b.mib.length) return(
    <div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>
      <div style={{fontSize:32,marginBottom:8}}>🏛</div>
      <div>МИБ жараёни мавжуд эмас</div>
      <button className="btn btn-primary btn-sm" style={{marginTop:12}}>+ МИБ иши юбориш</button>
    </div>
  );
  return <div>{b.mib.map((m,i)=>(
    <div key={i} className="card" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}>
        <div style={{fontWeight:800,fontSize:15}}>{m.execNo}</div>
        <Badge type="yellow">{m.status}</Badge>
      </div>
      <div className="info-grid">
        <InfoRow label="Ижро иши рақами" value={m.execNo}/>
        <InfoRow label="Ижро иши ҳолати" value={m.status}/>
        <InfoRow label="Масъул давлат ижрочиси" value={m.executor}/>
        <InfoRow label="Ундирилган маблағ" value={fmt(m.collected)+" сўм"} color="var(--accent3)"/>
        <InfoRow label="Қолдиқ қарздорлик" value={fmt(m.remaining)+" сўм"} color="var(--danger)"/>
        <InfoRow label="Охирги ҳаракат санаси" value={m.lastAction}/>
      </div>
      <div style={{marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
          <span style={{color:"var(--text3)"}}>Ундириш прогресси</span>
          <span style={{fontSize:12}}>{fmtM(m.collected)} / {fmtM(m.collected+m.remaining)}</span>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{width:`${Math.round(m.collected/(m.collected+m.remaining)*100)}%`,background:"var(--accent3)"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <button className="btn btn-secondary btn-sm">📋 Ижро хужжати</button>
        <button className="btn btn-secondary btn-sm">📞 Ижрочи билан боғланиш</button>
        <button className="btn btn-secondary btn-sm">📝 Янги ҳаракат қайд этиш</button>
      </div>
    </div>
  ))}</div>;
}

function TabAuction({b}){
  if(!b.auctions.length) return(
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:32,marginBottom:8}}>🔨</div>
      <div style={{color:"var(--text3)",marginBottom:16}}>Аукцион маълумотлари мавжуд эмас</div>
      {b.collateral.length>0&&<button className="btn btn-primary">🔨 Гаровни аукционга чиқариш</button>}
    </div>
  );
  return <div>{b.auctions.map((a,i)=>(
    <div key={i} className="card" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}>
        <div style={{fontWeight:700}}>Аукцион #{i+1}</div>
        <Badge type={a.payStatus==="Амалга оширилган"?"green":"yellow"}>{a.payStatus}</Badge>
      </div>
      <div className="info-grid">
        <InfoRow label="Аукцион санаси" value={a.date}/>
        <InfoRow label="Ғолиб иштирокчи" value={a.winner||"—"}/>
        <InfoRow label="Сотув нархи" value={a.salePrice?fmt(a.salePrice)+" сўм":"—"} color={a.salePrice?"var(--accent)":undefined}/>
        <InfoRow label="Тўловни амалга ошириш муддати" value={a.payDeadline||"—"}/>
        <InfoRow label="Тўлов ҳолати" value={a.payStatus}/>
        <InfoRow label="Тўлов санаси" value={a.payDate||"—"}/>
        <InfoRow label="Мулкни расмийлаштириш ҳолати" value={a.regStatus}/>
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <button className="btn btn-secondary btn-sm">📄 Аукцион протоколи</button>
        <button className="btn btn-secondary btn-sm">📝 Натижа киритиш</button>
      </div>
    </div>
  ))}</div>;
}

function TabPayments({b}){
  if(!b.payments.length) return <div style={{color:"var(--text3)",padding:32,textAlign:"center"}}>Тўловлар тарихи мавжуд эмас</div>;
  const total=b.payments.reduce((a,p)=>a+p.amount,0);
  return(
    <div>
      <div style={{display:"flex",gap:12,marginBottom:12}}>
        <div className="card" style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:11,color:"var(--text3)"}}>Жами тўланган</div>
          <div style={{fontWeight:800,fontSize:18,color:"var(--accent3)"}}>{fmtM(total)}</div>
        </div>
        <div className="card" style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:11,color:"var(--text3)"}}>Тўловлар сони</div>
          <div style={{fontWeight:800,fontSize:18,color:"var(--accent2)"}}>{b.payments.length} та</div>
        </div>
      </div>
      <div className="card" style={{padding:0}}>
        <table>
          <thead><tr><th>Сана</th><th>Сумма</th><th>Тури</th><th>Канал</th></tr></thead>
          <tbody>
            {b.payments.map((p,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{p.date}</td>
                <td style={{fontWeight:700,color:"var(--accent3)"}}>{fmt(p.amount)} сўм</td>
                <td><Badge type="blue">{p.type}</Badge></td>
                <td>{p.channel}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function TabNotes({b}){
  const[text,setText]=useState("");
  return(
    <div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,marginBottom:8,fontSize:13}}>Янги изоҳ қўшиш</div>
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder="Изоҳингизни ёзинг..."
          style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:10,color:"var(--text)",fontSize:13,height:80,resize:"none",outline:"none",marginBottom:8}}/>
        <button className="btn btn-primary btn-sm">+ Изоҳ сақлаш</button>
      </div>
      {b.notes.length===0?(
        <div style={{color:"var(--text3)",textAlign:"center",padding:20}}>Изоҳлар мавжуд эмас</div>
      ):(
        <div className="timeline">
          {b.notes.map((n,i)=>(
            <div key={i} className="tl-item">
              <div className="tl-line">
                <div className="tl-dot"/>
                {i<b.notes.length-1&&<div className="tl-connector"/>}
              </div>
              <div className="tl-content">
                <div style={{display:"flex",gap:8,marginBottom:4,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"var(--text3)"}}>{n.date}</span>
                  <Badge type="blue">{n.author}</Badge>
                </div>
                <div style={{fontSize:13}}>{n.text}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Placeholder({title,icon}){
  return(
    <div style={{textAlign:"center",padding:80}}>
      <div style={{fontSize:56,marginBottom:16}}>{icon}</div>
      <div style={{fontSize:20,fontWeight:700,marginBottom:8}}>{title}</div>
      <div style={{color:"var(--text3)"}}>Бу бўлим ишлаб чиқилмоқда</div>
    </div>
  );
}

const NAV=[
  {id:"dashboard",label:"Бош панел",icon:"📊",sec:"Умумий"},
  {id:"monitoring",label:"Мониторинг",icon:"👁",sec:"Умумий"},
  {id:"borrowers",label:"Мижозлар",icon:"📋",sec:"Коллекция",badge:4},
  {id:"promises",label:"Тўлов ваъдалари",icon:"📅",sec:"Коллекция"},
  {id:"auction",label:"Аукцион",icon:"🔨",sec:"Коллекция"},
  {id:"sms",label:"SMS кампаниялар",icon:"💬",sec:"Воситалар"},
  {id:"docs",label:"Ҳужжатлар",icon:"📄",sec:"Воситалар"},
  {id:"reports",label:"Ҳисоботлар",icon:"📈",sec:"Воситалар"},
  {id:"audit",label:"Аудит журнали",icon:"🔐",sec:"Тизим"},
];

function App(){
  const[page,setPage]=useState("dashboard");
  const[sel,setSel]=useState(null);
  const secs=[...new Set(NAV.map(n=>n.sec))];
  const titles={dashboard:"Бош панел",monitoring:"Мониторинг",borrowers:"Мижозлар рўйхати",promises:"Тўлов ваъдалари",auction:"Аукцион",sms:"SMS Кампаниялар",docs:"Ҳужжатлар",reports:"Ҳисоботлар",audit:"Аудит журнали"};
  return(
    <>
      <div className="sidebar">
        <div className="logo">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
            <div style={{width:34,height:34,background:"var(--accent)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#000",fontSize:13,flexShrink:0}}>TB</div>
            <div>
              <div className="logo-title">TRASTBANK</div>
              <div className="logo-sub">COLLECTION CRM</div>
            </div>
          </div>
        </div>
        {secs.map(sec=>(
          <div key={sec} className="nav-section">
            <div className="nav-label">{sec}</div>
            {NAV.filter(n=>n.sec===sec).map(n=>(
              <div key={n.id} className={`nav-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
                <span className="icon">{n.icon}</span>
                <span>{n.label}</span>
                {n.badge&&<span className="nav-badge">{n.badge}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{titles[page]||"—"}</div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-secondary btn-sm">🔔 <span style={{color:"var(--danger)",fontWeight:700}}>3</span></button>
            <div style={{width:32,height:32,background:"var(--accent)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#000",fontSize:12,cursor:"pointer"}}>АН</div>
          </div>
        </div>
        <div className="content">
          {page==="dashboard"&&<Dashboard/>}
          {page==="borrowers"&&<BorrowerList onOpen={b=>setSel(b)}/>}
          {page==="monitoring"&&<Placeholder title="Мониторинг" icon="👁"/>}
          {page==="promises"&&<Placeholder title="Тўлов ваъдалари" icon="📅"/>}
          {page==="auction"&&<Placeholder title="Аукцион" icon="🔨"/>}
          {page==="sms"&&<Placeholder title="SMS Кампаниялар" icon="💬"/>}
          {page==="docs"&&<Placeholder title="Ҳужжатлар" icon="📄"/>}
          {page==="reports"&&<Placeholder title="Ҳисоботлар" icon="📈"/>}
          {page==="audit"&&<Placeholder title="Аудит журнали" icon="🔐"/>}
        </div>
      </div>
      {sel&&<Card360 b={sel} onClose={()=>setSel(null)}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
