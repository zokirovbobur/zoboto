<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/prototypes/trastbank-pmo/" />
<title>Trastbank — Project Reporting Board</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --navy:#0E2A52; --navy-2:#16356A; --navy-3:#1E4279;
  --ink:#16203A; --muted:#65718A; --muted-2:#8A93A6;
  --line:#E5EAF2; --line-2:#EEF2F8; --bg:#F2F5FA; --card:#FFFFFF;
  --accent:#2563EB; --accent-soft:#E7EEFD; --teal:#0E9C8E;
  --c-completed:#138A5E; --c-progress:#2563EB; --c-planned:#6D5CD6; --c-paused:#C2410C;
  --shadow-sm:0 1px 2px rgba(16,30,60,.06), 0 1px 3px rgba(16,30,60,.05);
  --shadow:0 2px 6px rgba(16,30,60,.06), 0 8px 24px rgba(16,30,60,.06);
  --shadow-lg:0 12px 40px rgba(16,30,60,.16);
  --r:14px; --r-sm:10px;
  --sidebar:248px;
  --topbar-bg:rgba(255,255,255,.86);
  --thead-bg:#FBFCFE;
  --tr-hover:#F7F9FD;
  --select-bg:#fff;
  --modal-bg:#fff;
}
[data-theme="dark"]{
  --navy:#1E3A6E; --navy-2:#243F78; --navy-3:#2B4A85;
  --ink:#E2E8F4; --muted:#8A96AE; --muted-2:#6B7590;
  --line:#2A3348; --line-2:#222B3D; --bg:#141922; --card:#1C2333;
  --accent:#4D8EF5; --accent-soft:rgba(77,142,245,.15); --teal:#1AB5A5;
  --c-completed:#22C47A; --c-progress:#4D8EF5; --c-planned:#9B7FF5; --c-paused:#F07040;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);
  --shadow:0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:0 12px 40px rgba(0,0,0,.5);
  --topbar-bg:rgba(20,25,34,.92);
  --thead-bg:#1A2230;
  --tr-hover:#1F2A3C;
  --select-bg:#1C2333;
  --modal-bg:#1C2333;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{cursor:pointer;text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:2px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2);}
::-webkit-scrollbar-track{background:transparent;}

/* ===== layout ===== */
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar);background:linear-gradient(180deg,#0C2548 0%,#0E2A52 60%,#102E5A 100%);
  color:#cfdaee;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:40;}
.brand{display:flex;align-items:center;gap:11px;padding:20px 20px 18px;}
.brand-mark{width:38px;height:38px;border-radius:10px;background:#fff;display:grid;place-items:center;flex:none;
  box-shadow:0 3px 10px rgba(0,0,0,.25);}
.brand-mark span{font-weight:700;color:var(--navy);font-size:19px;letter-spacing:-.5px;}
.brand-txt b{display:block;color:#fff;font-size:15px;font-weight:600;letter-spacing:-.2px;line-height:1.1;}
.brand-txt small{color:#7e93b6;font-size:10.5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;}
.nav{flex:1;overflow-y:auto;padding:6px 12px 20px;}
.nav-group{margin-top:16px;}
.nav-group-t{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#5e7299;padding:0 12px 7px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#bccbe3;
  font-size:13.5px;font-weight:500;width:100%;text-align:left;margin-bottom:1px;transition:background .12s,color .12s;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:linear-gradient(90deg,#2563EB,#3B74F0);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.4);}
.nav-item .ic{width:18px;height:18px;flex:none;opacity:.92;}
.nav-item .badge-n{margin-left:auto;font-size:11px;font-weight:600;background:rgba(255,255,255,.13);
  padding:1px 7px;border-radius:20px;min-width:22px;text-align:center;}
.nav-item.active .badge-n{background:rgba(255,255,255,.22);}
.nav-item .badge-n-warn{background:#C0392B33;color:#F87171;}
.nav-item.active .badge-n-warn{background:#C0392B55;color:#FCA5A5;}
.sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#6d82a6;}

.main{flex:1;margin-left:var(--sidebar);display:flex;flex-direction:column;min-width:0;}
.topbar{height:62px;background:var(--topbar-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;padding:0 26px;position:sticky;top:0;z-index:30;}
.search-box{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:0 12px;height:38px;width:320px;max-width:38vw;}
.search-box input{border:none;background:none;outline:none;font-size:13.5px;width:100%;color:var(--ink);}
.search-box .ic{color:var(--muted-2);flex:none;}
.topbar-spacer{flex:1;}
.topbar-meta{text-align:right;font-size:11.5px;color:var(--muted);line-height:1.35;}
.topbar-meta b{color:var(--ink);font-weight:600;}
.lang-switch{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
.theme-toggle{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--muted);transition:.15s;}
.theme-toggle:hover{background:var(--card);color:var(--ink);border-color:var(--muted-2);}
.lang-switch button{font-size:12px;font-weight:600;padding:5px 11px;border-radius:6px;color:var(--muted);transition:.12s;}
.lang-switch button.on{background:var(--card);color:var(--navy);box-shadow:var(--shadow-sm);}

.content{padding:24px 26px 48px;max-width:1480px;width:100%;}
.pagehead{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.crumbs{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:7px;}
.crumb{color:var(--accent);font-weight:500;}
.crumb-cur{color:var(--muted);}
.crumb-sep{color:var(--muted-2);}
.page-title{font-size:24px;font-weight:700;letter-spacing:-.5px;margin:0;color:var(--ink);}
.page-sub{margin:5px 0 0;color:var(--muted);font-size:13.5px;}
.pagehead-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

/* ===== cards ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);}
.card-pad{padding:18px 20px;}
.card-h{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line-2);}
.card-h h3{margin:0;font-size:14.5px;font-weight:600;color:var(--ink);}
.card-h .hint{font-size:11px;color:var(--muted-2);font-weight:500;}
.grid{display:grid;gap:16px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;text-align:left;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s,border-color .12s;}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kpi-accent,transparent);}
.kpi-click:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#d4ddec;}
.kpi-val{font-size:27px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--ink);}
.kpi-label{font-size:12px;color:var(--muted);margin-top:7px;font-weight:500;}
.kpi-sub{font-size:11px;color:var(--muted-2);margin-top:3px;}

/* badges / pills */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px 3px 8px;border-radius:20px;white-space:nowrap;}
.badge-dot{width:6px;height:6px;border-radius:50%;flex:none;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap;}
.pill-neutral{background:var(--line-2);color:var(--muted);}
.pill-blue{background:var(--accent-soft);color:var(--accent);}
.pill-green{background:#E4F3EB;color:var(--c-completed);}
.pill-amber{background:#FBECD9;color:#B45309;}
.pill-red{background:#FCE8E6;color:#C0392B;}
.pill-violet{background:#ECEAFB;color:var(--c-planned);}
[data-theme="dark"] .pill-green{background:rgba(34,196,122,.12);}
[data-theme="dark"] .pill-amber{background:rgba(240,112,64,.12);color:#F07040;}
[data-theme="dark"] .pill-red{background:rgba(220,50,50,.12);color:#F87171;}
[data-theme="dark"] .pill-violet{background:rgba(155,127,245,.12);}
[data-theme="dark"] .pill-neutral{background:var(--line);}
[data-theme="dark"] .pill-blue{background:rgba(77,142,245,.12);}

/* avatar */
.avatar{display:inline-grid;place-items:center;border-radius:50%;color:#fff;font-weight:600;flex:none;letter-spacing:-.3px;}
.av-stack{display:flex;}
.av-stack .avatar{border:2px solid #fff;margin-left:-8px;}
.av-stack .avatar:first-child{margin-left:0;}

/* progress */
.progress{height:6px;background:var(--line-2);border-radius:20px;overflow:hidden;width:100%;min-width:54px;}
.progress-fill{height:100%;border-radius:20px;transition:width .3s;}

/* ===== table ===== */
.tbl-wrap{overflow-x:auto;}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
  color:var(--muted-2);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;background:var(--thead-bg);position:sticky;top:0;}
.tbl thead th.no-sort{cursor:default;}
.tbl thead th .arr{opacity:.5;font-size:9px;margin-left:3px;}
.tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle;}
.tbl tbody tr{transition:background .1s;cursor:pointer;}
.tbl tbody tr:hover{background:var(--tr-hover);}
.tbl tbody tr:last-child td{border-bottom:none;}
.cell-proj{font-weight:600;color:var(--ink);max-width:280px;}
.cell-proj small{display:block;font-weight:400;color:var(--muted-2);font-size:11px;margin-top:2px;}
.t-muted{color:var(--muted);}
.demo-dot{display:inline-flex;align-items:center;gap:6px;font-size:12px;}
.dot{width:8px;height:8px;border-radius:50%;flex:none;}

/* filters */
.filterbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.sel{position:relative;}
select.f-sel{appearance:none;background:var(--select-bg);border:1px solid var(--line);border-radius:9px;padding:8px 30px 8px 12px;
  font-size:12.5px;font-weight:500;color:var(--ink);outline:none;cursor:pointer;font-family:inherit;}
select.f-sel:hover{border-color:#c8d3e4;}
.sel::after{content:"▾";position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted-2);font-size:10px;}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:9px;
  padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--ink);transition:.12s;}
.btn:hover{border-color:#c8d3e4;background:var(--tr-hover);}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-primary:hover{background:var(--navy-2);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--accent);}
.btn-ghost:hover{background:var(--accent-soft);}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;background:var(--card);border:1px solid var(--line);color:var(--muted);transition:.12s;}
.chip:hover{border-color:#c8d3e4;color:var(--ink);}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ===== kanban ===== */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
.kcol{background:#EEF2F8;border-radius:var(--r);padding:10px;min-height:200px;}
.kcol-h{display:flex;align-items:center;gap:8px;padding:6px 8px 12px;}
.kcol-h .kc-dot{width:9px;height:9px;border-radius:3px;flex:none;}
.kcol-h b{font-size:13px;font-weight:600;}
.kcol-h .kc-n{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted);background:var(--bg);padding:1px 8px;border-radius:20px;}
.kcard{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow-sm);
  cursor:pointer;transition:transform .1s,box-shadow .1s;border-left:3px solid var(--kc,#ccc);}
.kcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.kcard-t{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:7px;color:var(--ink);}
.kcard-meta{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
.kcard-foot{display:flex;align-items:center;gap:8px;margin-top:9px;}

/* detail */
.detail-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start;}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.fact{padding:12px 4px;border-bottom:1px solid var(--line-2);}
.fact:nth-last-child(-n+2){border-bottom:none;}
.fact-l{font-size:11px;color:var(--muted-2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.fact-v{font-size:14px;font-weight:600;color:var(--ink);margin-top:3px;word-break:break-word;}
.fact-v.sm{font-size:13px;font-weight:500;}
.tl{position:relative;padding-left:6px;}
.tl-step{display:flex;gap:12px;padding-bottom:18px;position:relative;}
.tl-step:last-child{padding-bottom:0;}
.tl-step::before{content:"";position:absolute;left:7px;top:18px;bottom:-2px;width:2px;background:var(--line);}
.tl-step:last-child::before{display:none;}
.tl-dot{width:16px;height:16px;border-radius:50%;border:3px solid var(--card);flex:none;z-index:1;box-shadow:0 0 0 1px var(--line);}
.tl-c b{font-size:13px;display:block;}
.tl-c span{font-size:12px;color:var(--muted);}
.health{display:flex;align-items:center;gap:14px;}
.health-ring{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;flex:none;font-weight:700;font-size:15px;color:#fff;}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:13px;}
.member-row:last-child{border-bottom:none;}
.member-role{margin-left:auto;font-size:11px;color:var(--muted);}

/* employee profile */
.emp-hero{display:flex;align-items:center;gap:18px;}
.bars{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:12px;font-size:13px;}
.bar-row .bn{width:160px;flex:none;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:20px;background:var(--line-2);border-radius:6px;overflow:hidden;display:flex;}
.bar-seg{height:100%;}
.bar-row .bt{width:34px;text-align:right;font-weight:600;color:var(--muted);flex:none;}

/* report cards */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.report-card{cursor:pointer;}
.report-card .rc-ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:18px;margin-bottom:12px;}

/* toast */
.toast-host{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200;}
.toast{display:flex;align-items:center;gap:10px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:11px;
  box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;animation:toastIn .25s ease;}
.toast-ico{width:20px;height:20px;border-radius:50%;background:#1AA568;display:grid;place-items:center;font-size:12px;flex:none;}
@keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(14,30,60,.42);backdrop-filter:blur(2px);z-index:150;
  display:grid;place-items:center;padding:30px;animation:fade .15s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--modal-bg);border-radius:16px;box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:86vh;overflow:auto;animation:pop .2s;}
@keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:none;opacity:1;}}

/* misc */
.empty{text-align:center;color:var(--muted-2);padding:40px;font-size:13px;}
.row{display:flex;align-items:center;gap:8px;}
.wrap{display:flex;gap:8px;flex-wrap:wrap;}
.muted{color:var(--muted);}
.fade-in{animation:fadeUp .28s ease;}
@keyframes fadeUp{from{transform:translateY(7px);}to{transform:none;}}
.ticker-track{display:flex;align-items:center;white-space:nowrap;height:38px;animation:ticker-scroll 28s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
.ticker-item{display:inline-flex;align-items:center;flex-shrink:0;}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
[data-theme="dark"] .ticker-banner{background:#2D1414 !important;border-color:#5C2222 !important;}
[data-theme="dark"] .ticker-text{color:#FFCACA !important;}
[data-theme="dark"] .ticker-dot{color:#7B3535 !important;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px;}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle;}
.tag{font-size:11px;font-weight:600;color:var(--muted);background:var(--line-2);padding:2px 8px;border-radius:6px;}

/* ===== mobile nav ===== */
.mob-btn{display:none;width:38px;height:38px;align-items:center;justify-content:center;
  background:var(--bg);border:1px solid var(--line);border-radius:9px;flex:none;padding:0;}
.sidebar-ov{display:none;position:fixed;inset:0;background:rgba(14,30,60,.42);z-index:35;}
.sidebar-ov.on{display:block;}
.stat-bg{display:grid;gap:14px;margin-bottom:16px;grid-template-columns:repeat(4,1fr);}

@media(max-width:1180px){
  .kpi-row{grid-template-columns:repeat(3,1fr);}
  .kanban{grid-template-columns:repeat(2,1fr);}
  .detail-grid,.report-grid{grid-template-columns:1fr;}
  .stat-bg{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:860px){
  :root{--sidebar:0px;}
  .sidebar{transform:translateX(-248px);transition:transform .24s ease;width:248px;}
  .sidebar.on{transform:translateX(0);}
  .main{margin-left:0;}
  .mob-btn{display:flex;}
  .topbar-meta{display:none;}
  .topbar{padding:0 14px;gap:10px;}
  .search-box{width:auto;flex:1;}
  .kpi-row{grid-template-columns:repeat(2,1fr)!important;}
  .grid{grid-template-columns:1fr!important;}
  .stat-bg{grid-template-columns:1fr!important;}
  .kanban{grid-template-columns:1fr;}
  .content{padding:16px 14px 48px;}
  .bar-row .bn{width:120px;}
}
@media(max-width:480px){
  .kpi-val{font-size:21px;}
  .kpi{padding:11px 12px;}
  .page-title{font-size:18px;}
  .bar-row .bn{width:80px;}
  .facts{grid-template-columns:1fr!important;}
  .fact:nth-last-child(-n+2){border-bottom:1px solid var(--line-2);}
  .fact:last-child{border-bottom:none;}
  .topbar{height:56px;}
  .search-box{max-width:140px;}
}
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" rx="20" fill="#0E2A52"/>
<rect x="30" y="30" width="40" height="40" rx="8" fill="#fff"/>
<text x="50" y="58" font-family="sans-serif" font-size="22" font-weight="700" fill="#0E2A52" text-anchor="middle">T</text>
