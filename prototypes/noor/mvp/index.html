<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Noor Ecosystem MVP Demo</title>
<style>
  :root{
    --green:#0d4d3a;
    --green-2:#10654b;
    --green-soft:#e8f1ec;
    --gold:#c9a14a;
    --gold-soft:#f5ecd6;
    --beige:#f7f2e8;
    --bg:#f1ede4;
    --ink:#0e1a16;
    --muted:#6b7470;
    --line:#e4dfd2;
    --red:#b3261e;
    --amber:#a36b00;
    --purple:#5c3d99;
    --purple-soft:#ede8f7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.4}
  button{font-family:inherit;cursor:pointer}
  .topbar{background:linear-gradient(90deg,var(--green) 0%,var(--green-2) 100%);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
  .topbar h1{margin:0;font-size:18px;letter-spacing:.3px;font-weight:600}
  .topbar h1 span{color:var(--gold);font-weight:700}
  .topbar .controls{display:flex;gap:8px;flex-wrap:wrap}
  .ctrl-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 13px;border-radius:8px;font-size:12px;transition:.15s}
  .ctrl-btn:hover{background:rgba(255,255,255,.22)}
  .ctrl-btn.gold{background:var(--gold);border-color:var(--gold);color:#1a1206;font-weight:600}
  .ctrl-btn.gold:hover{background:#d8b25c}

  .layout{display:grid;grid-template-columns:1fr 320px;gap:16px;padding:16px;max-width:1600px;margin:0 auto}
  @media(max-width:1100px){.layout{grid-template-columns:1fr}}

  .apps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:900px){.apps{grid-template-columns:1fr}.tabs{display:flex!important}}
  .tabs{display:none;gap:6px;margin-bottom:8px}
  .tabs button{flex:1;padding:10px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:600}
  .tabs button.active{background:var(--green);color:#fff;border-color:var(--green)}

  .phone{background:#0e1a16;border-radius:28px;padding:10px;box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .phone-head{display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:11px;padding:6px 14px 4px;opacity:.8}
  .screen{background:var(--beige);border-radius:20px;min-height:760px;max-height:760px;overflow-y:auto;padding:14px;position:relative}
  .screen::-webkit-scrollbar{width:6px}
  .screen::-webkit-scrollbar-thumb{background:#cfc8b6;border-radius:3px}
  .app-title{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--green);font-size:15px;margin-bottom:12px}
  .app-title .dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}

  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .card.green{background:linear-gradient(135deg,var(--green) 0%,var(--green-2) 100%);color:#fff;border:none}
  .card.gold{background:var(--gold-soft);border-color:var(--gold)}
  .card.purple{background:var(--purple-soft);border-color:rgba(92,61,153,.3)}
  .card h3{margin:0 0 6px;font-size:13px;letter-spacing:.2px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:4px 0}
  .row .label{color:var(--muted);font-size:12px}
  .row .val{font-weight:600;font-size:13px}
  .big{font-size:22px;font-weight:700}
  .muted{color:var(--muted);font-size:12px}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--green-soft);color:var(--green)}
  .pill.gold{background:var(--gold-soft);color:#7a5a13}
  .pill.red{background:#fde7e5;color:var(--red)}
  .pill.amber{background:#fdf0d6;color:var(--amber)}
  .pill.gray{background:#eee;color:#555}
  .pill.purple{background:var(--purple-soft);color:var(--purple)}

  .sccp{background:#0e1a16;color:var(--gold);border-radius:10px;padding:8px 10px;font-size:11px;margin:8px 0;border-left:3px solid var(--gold)}
  .sccp b{color:#fff;display:block;margin-bottom:2px;font-size:11px}

  .cat{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
  .cat div{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center;font-size:11px;font-weight:600}
  .cat div.active{background:var(--green);color:#fff;border-color:var(--green)}

  .btn{width:100%;padding:11px;border:none;border-radius:10px;background:var(--green);color:#fff;font-weight:600;font-size:13px;margin-top:8px;transition:.15s}
  .btn:hover:not(:disabled){background:var(--green-2)}
  .btn:disabled{background:#bcc4c0;cursor:not-allowed}
  .btn.gold{background:var(--gold);color:#1a1206}
  .btn.gold:hover:not(:disabled){background:#d8b25c}
  .btn.outline{background:#fff;color:var(--green);border:1px solid var(--green)}
  .btn.danger{background:#fff;color:var(--red);border:1px solid var(--red)}
  .btn.amber{background:#fff;color:var(--amber);border:1px solid var(--amber)}
  .btn.sm{padding:7px;font-size:11px;margin-top:4px}

  .status-list{list-style:none;padding:0;margin:6px 0 0}
  .status-list li{padding:6px 0 6px 22px;position:relative;font-size:12px;color:var(--muted);border-left:2px solid var(--line);margin-left:6px;padding-left:14px}
  .status-list li.done{color:var(--green);font-weight:600;border-left-color:var(--green)}
  .status-list li.active{color:var(--gold);font-weight:700;border-left-color:var(--gold)}
  .status-list li.cancelled{color:var(--red);border-left-color:var(--red)}
  .status-list li::before{content:"";position:absolute;left:-7px;top:10px;width:10px;height:10px;border-radius:50%;background:var(--line);border:2px solid var(--bg)}
  .status-list li.done::before{background:var(--green)}
  .status-list li.active::before{background:var(--gold);box-shadow:0 0 0 3px rgba(201,161,74,.25)}
  .status-list li.cancelled::before{background:var(--red)}

  .checkbox{display:flex;align-items:center;gap:8px;padding:8px;background:#fff;border:1px solid var(--line);border-radius:8px;margin:4px 0;cursor:pointer;font-size:12px}
  .checkbox input{width:18px;height:18px;accent-color:var(--green)}

  .progress{height:10px;background:#e4dfd2;border-radius:6px;overflow:hidden;margin:6px 0}
  .progress div{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .5s}
  .progress-pulse div{animation:pulse-bar 1.2s ease-in-out infinite}
  @keyframes pulse-bar{0%,100%{opacity:.6}50%{opacity:1}}

  .qr{width:140px;height:140px;margin:10px auto;background:
    repeating-conic-gradient(#000 0 25%, #fff 0 50%) 50% / 14px 14px;
    border:8px solid #fff;box-shadow:0 0 0 1px var(--line);border-radius:6px}

  .side{display:flex;flex-direction:column;gap:14px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
  .panel h2{margin:0 0 10px;font-size:14px;color:var(--green);letter-spacing:.3px;text-transform:uppercase}

  .timeline{list-style:none;padding:0;margin:0;max-height:300px;overflow-y:auto}
  .timeline li{font-size:11.5px;padding:5px 0 5px 18px;position:relative;color:var(--muted);border-left:2px solid var(--line);margin-left:5px;padding-left:14px}
  .timeline li.done{color:var(--green);font-weight:600;border-left-color:var(--green)}
  .timeline li.active{color:var(--gold);font-weight:700;border-left-color:var(--gold)}
  .timeline li::before{content:"";position:absolute;left:-6px;top:9px;width:9px;height:9px;border-radius:50%;background:var(--line)}
  .timeline li.done::before{background:var(--green)}
  .timeline li.active::before{background:var(--gold);box-shadow:0 0 0 3px rgba(201,161,74,.25)}

  .ownership{display:flex;flex-direction:column;gap:6px}
  .own-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:#f7f2e8;font-size:12px}
  .own-row.active{background:var(--green);color:#fff;font-weight:600}
  .own-row .who{flex:1}

  .log{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;background:#0e1a16;color:#9ec6b6;border-radius:10px;padding:10px;max-height:180px;overflow-y:auto}
  .log div{padding:2px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
  .log .t{color:var(--gold);margin-right:6px}

  /* Shariah panel */
  .sccp-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px}
  .sccp-item:last-child{border-bottom:none}
  .sccp-dot{width:18px;height:18px;border-radius:50%;background:var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px}
  .sccp-dot.pass{background:var(--green);color:#fff}
  .sccp-dot.warn{background:var(--red);color:#fff}
  .sccp-label{flex:1}
  .sccp-label b{display:block;color:var(--ink);font-size:11px;font-weight:600}
  .sccp-label span{color:var(--muted);font-size:11px}
  .sccp-item.pass .sccp-label b{color:var(--green)}

  .overdue-banner{background:#fde7e5;border:1px solid var(--red);border-radius:12px;padding:12px;margin-bottom:10px}
  .overdue-banner h3{margin:0 0 4px;font-size:13px;color:var(--red)}

  .empty{color:var(--muted);font-size:12px;text-align:center;padding:16px;font-style:italic}

  details{margin-top:6px}
  summary{cursor:pointer;font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<header class="topbar">
  <h1>🕌 Noor <span>Ecosystem</span> — MVP Demo</h1>
  <div class="controls">
    <button class="ctrl-btn" onclick="autoPlay()">▶ Auto-play сценарий</button>
    <button class="ctrl-btn gold" onclick="resetDemo()">⟳ Reset demo</button>
    <a href="/prototypes/noor/mvp/bpmn" target="_blank" class="ctrl-btn" style="text-decoration:none;">📊 BPMN</a>
  </div>
</header>

<div class="layout">
  <div>
    <div class="tabs">
      <button class="active" data-tab="m" onclick="switchTab('m')">Marketplace</button>
      <button data-tab="b" onclick="switchTab('b')">B2B</button>
      <button data-tab="d" onclick="switchTab('d')">Delivery</button>
    </div>

    <div class="apps">
      <div class="phone" data-app="m">
        <div class="phone-head"><span>9:41</span><span>Noor Marketplace</span><span>●●●</span></div>
        <div class="screen" id="screen-marketplace"></div>
      </div>
      <div class="phone" data-app="b">
        <div class="phone-head"><span>9:41</span><span>Noor B2B</span><span>●●●</span></div>
        <div class="screen" id="screen-b2b"></div>
      </div>
      <div class="phone" data-app="d">
        <div class="phone-head"><span>9:41</span><span>Noor Delivery</span><span>●●●</span></div>
        <div class="screen" id="screen-delivery"></div>
      </div>
    </div>
  </div>

  <aside class="side">
    <div class="panel">
      <h2>📊 Live Process Timeline</h2>
      <ul class="timeline" id="timeline"></ul>
    </div>
    <div class="panel">
      <h2>🔁 Ownership &amp; Risk</h2>
      <div class="ownership" id="ownership"></div>
    </div>
    <div class="panel">
      <h2>🕌 Shariah Compliance</h2>
      <div id="shariah-panel"></div>
    </div>
    <div class="panel">
      <h2>📜 Event Log</h2>
      <div class="log" id="log"></div>
    </div>
  </aside>
</div>

<script>
const ORDER = {
  id:'N-1001',
  buyer:{name:'Абдулло', market:'Чорсу', type:'Розничный торговец картофелем'},
  supplier:{name:'Food City Agro Optom', loc:'Food City, блок B-14'},
  driver:{name:'Акмал', car:'Labo', plate:'01 A 777 AA', loc:'Food City parking'},
  product:'Картофель "Гала"',
  qty:'1 тонна',
  cost:6000000,
  markup:180000,
  total:6180000,
  term:7,
  delivery:150000,
  pricePerKg:6000,
  stockTons:12,
  limit:50000000
};

const DEFAULT_STATE = {
  orderCreated:false,
  orderStatus:null,
  /* #1 Limit assessment */
  limitChecking:false,
  fundsReserved:false,
  limitInsufficient:false,
  /* order flow */
  ownership:'supplier',
  supplierConfirmed:false,
  supplierPaid:false,
  driverAssigned:false,
  driverAccepted:false,
  driverAtSupplier:false,
  qabdConfirmed:false,
  inDelivery:false,
  arrivedAtBuyer:false,
  /* #3 QR scan → terms → accept */
  qrScanned:false,
  contractGenerated:false,
  murabahaAccepted:false,
  /* repayment */
  fullyRepaid:false,
  cancelled:false,
  dispute:null,
  debt:0,
  repaid:0,
  supplierBalance:0,
  driverBalance:0,
  traderBalance:0,
  checklist:{qty:false, quality:false, loaded:false},
  /* #9 Overdue */
  overdueActive:false,
  charityPenalty:0,
  log:[],
  tab:'m'
};

let state = load() || JSON.parse(JSON.stringify(DEFAULT_STATE));
let _limitTimer = null;
let _bankTimer = null;

function save(){ localStorage.setItem('noor_state', JSON.stringify(state)); }
function load(){ try{ return JSON.parse(localStorage.getItem('noor_state')); }catch(e){ return null; } }
function logEvent(msg){
  const t = new Date().toLocaleTimeString('ru-RU');
  state.log.unshift({t,msg});
  if(state.log.length>50) state.log.pop();
}

const TIMELINE = [
  ['prescoring',   'Prescoring completed'],
  ['limit',        'Limit shown to trader'],
  ['order',        'Order created'],
  ['limit_check',  'Financing limit assessed (Noor Core)'],
  ['funds_reserved','Funds reserved (Noor Core)'],
  ['supplier',     'Supplier confirmed stock'],
  ['purchase',     'Bank purchased goods from supplier'],
  ['own_bank',     'Ownership → Noor Bank (Qabd legal)'],
  ['driver',       'Driver assigned & accepted'],
  ['qabd',         'Physical qabd/kabz confirmed'],
  ['delivered',    'Goods delivered to buyer'],
  ['qr_scanned',   'Buyer confirmed receipt (QR scan)'],
  ['terms_shown',  'Murabaha terms shown & signed'],
  ['contract_gen', 'Murabaha contract generated (Noor Core)'],
  ['murabaha',     'Murabaha contract active'],
  ['schedule',     'Repayment schedule activated'],
  ['repaying',     'Repayment in progress'],
  ['repaid',       'Murabaha fully repaid']
];

function timelineStatus(key){
  const s = state;
  const map = {
    prescoring:    true,
    limit:         true,
    order:         s.orderCreated,
    limit_check:   s.fundsReserved || s.limitInsufficient,
    funds_reserved:s.fundsReserved,
    supplier:      s.supplierConfirmed,
    purchase:      s.supplierPaid,
    own_bank:      s.ownership==='bank'||s.ownership==='client'||s.ownership==='closed',
    driver:        s.driverAccepted,
    qabd:          s.qabdConfirmed,
    delivered:     s.arrivedAtBuyer,
    qr_scanned:    s.qrScanned,
    terms_shown:   s.contractGenerated,
    contract_gen:  s.contractGenerated,
    murabaha:      s.murabahaAccepted,
    schedule:      s.murabahaAccepted,
    repaying:      s.repaid>0 && !s.fullyRepaid,
    repaid:        s.fullyRepaid
  };
  return map[key];
}

/* ── Actions ── */

// #1 — Limit gateway
function createOrder(){
  state.orderCreated = true;
  state.limitChecking = true;
  state.orderStatus = 'limit_checking';
  logEvent('🛒 Заказ N-1001 создан в Marketplace');
  logEvent('🔄 Noor Core: проверка лимита финансирования...');
  render();
  _limitTimer = setTimeout(limitCheckPass, 1800);
}

function limitCheckPass(){
  _limitTimer = null;
  if(!state.limitChecking) return;
  state.limitChecking = false;
  state.fundsReserved = true;
  state.orderStatus = 'supplier_pending';
  logEvent('✅ Лимит достаточен: 6 000 000 < 50 000 000 сум');
  logEvent('🔒 Noor Core: средства зарезервированы');
  logEvent('📤 Заказ направлен оптовику Food City Agro Optom');
  render();
}

function limitCheckFail(){
  if(_limitTimer){ clearTimeout(_limitTimer); _limitTimer = null; }
  state.limitChecking = false;
  state.limitInsufficient = true;
  state.cancelled = true;
  state.orderStatus = 'cancelled';
  logEvent('❌ Noor Core: лимит недостаточен. Заказ отменён.');
  render();
}

function supplierConfirm(){
  state.supplierConfirmed = true;
  state.orderStatus = 'bank_purchase_pending';
  logEvent('✅ Оптовик подтвердил наличие 1 тонны');
  render();
  _bankTimer = setTimeout(bankPurchase, 1200);
}

function supplierNoStock(){
  state.cancelled = true;
  state.dispute = 'supplier_no_stock';
  state.orderStatus = 'cancelled';
  logEvent('❌ Оптовик: нет в наличии. Заказ отменён.');
  render();
}

function bankPurchase(){
  _bankTimer = null;
  if(!state.supplierConfirmed || state.cancelled) return;
  state.supplierPaid = true;
  state.supplierBalance += ORDER.cost;
  state.ownership = 'bank';
  state.orderStatus = 'ownership_bank';
  state.driverAssigned = true;
  logEvent('🏦 Банк Noor оплатил оптовику 6 000 000 сум');
  logEvent('🔁 Собственность: Оптовик → Noor Bank (Qabd legal)');
  logEvent('🚚 Доставка назначена водителю Акмал');
  render();
}

function driverAccept(){
  state.driverAccepted = true;
  state.orderStatus = 'driver_accepted';
  logEvent('🚚 Водитель Акмал принял задание');
  render();
}
function driverAtSupplier(){
  state.driverAtSupplier = true;
  logEvent('📍 Водитель прибыл к оптовику Food City B-14');
  render();
}
function toggleCheck(k){
  state.checklist[k] = !state.checklist[k];
  save(); renderDelivery();
}
function driverConfirmQabd(){
  state.qabdConfirmed = true;
  state.inDelivery = true;
  state.orderStatus = 'qabd_confirmed';
  logEvent('🕌 Qabd/kabz зафиксирован. Водитель действует как Wakil банка.');
  logEvent('📦 Товар в пути к покупателю');
  render();
}
function driverQualityFail(){
  state.dispute = 'driver_quality';
  state.cancelled = true;
  state.orderStatus = 'dispute';
  logEvent('⚠ Водитель: товар не соответствует. Спор открыт.');
  render();
}
function driverArrived(){
  state.arrivedAtBuyer = true;
  state.orderStatus = 'receipt_pending';
  logEvent('📍 Водитель прибыл к покупателю на Чорсу');
  logEvent('📱 Покупатель должен отсканировать QR для подтверждения приёмки');
  render();
}

// #3 — Step 1: Buyer scans QR (physical receipt)
function buyerScanQR(){
  state.qrScanned = true;
  state.orderStatus = 'terms_pending';
  logEvent('📱 Покупатель отсканировал QR — физическая приёмка подтверждена');
  logEvent('📜 Marketplace: показаны условия договора Мурабаха');
  render();
}

// #3/#4 — Step 2: Buyer accepts terms → Noor Core generates contract
function acceptMurabaha(){
  state.murabahaAccepted = true;
  state.contractGenerated = true;
  state.ownership = 'client';
  state.orderStatus = 'murabaha_active';
  state.debt = ORDER.total;
  state.driverBalance += ORDER.delivery;
  logEvent('✍ Иджаб/Кабул: клиент принял условия Мурабахи');
  logEvent('📑 Noor Core: Договор Мурабаха сгенерирован и вступил в силу');
  logEvent('🕌 Shariah Audit: SCCP-1, 2, 3, 4 — пройдено');
  logEvent('🔁 Собственность: Noor Bank → Клиент');
  logEvent('💳 График погашения активирован: 6 180 000 сум, 7 дней');
  render();
}

function customerDispute(){
  state.dispute = 'customer';
  state.cancelled = true;
  state.orderStatus = 'dispute';
  logEvent('⚠ Клиент: проблема с товаром. Мурабаха НЕ активирована. Риск на банке.');
  render();
}

function qrSale(amount){
  if(!state.murabahaAccepted || state.fullyRepaid) return;
  const toMurabaha = Math.min(amount*0.2, state.debt);
  const toTrader = amount - toMurabaha;
  state.repaid += toMurabaha;
  state.debt -= toMurabaha;
  state.traderBalance += toTrader;
  state.orderStatus = 'repayment_in_progress';
  logEvent(`💸 QR-продажа ${amount.toLocaleString('ru-RU')} сум: ${toMurabaha.toLocaleString('ru-RU')} → погашение Мурабахи, ${toTrader.toLocaleString('ru-RU')} → торговец`);
  if(state.debt<=0.5){
    state.debt = 0;
    state.fullyRepaid = true;
    state.ownership = 'closed';
    state.orderStatus = 'fully_repaid';
    logEvent('🎉 Мурабаха полностью погашена. Договор закрыт.');
  }
  render();
}

// #9 — Overdue / Charity penalty
function triggerOverdue(){
  state.overdueActive = true;
  state.charityPenalty = Math.round(state.debt * 0.005);
  logEvent('⚠ Просрочка платежа! Рассчитывается благотворительный штраф (садака)');
  logEvent('🕌 Shariah: штраф = садака в благотворительный фонд — это не риба');
  render();
}

function payCharityPenalty(){
  logEvent(`💚 Штраф-садака ${state.charityPenalty.toLocaleString('ru-RU')} сум → благотворительный фонд`);
  state.overdueActive = false;
  state.charityPenalty = 0;
  logEvent('✅ Штраф оплачен. Погашение продолжается.');
  render();
}

function resetDemo(){
  if(!confirm('Сбросить демо?')) return;
  if(_limitTimer){ clearTimeout(_limitTimer); _limitTimer = null; }
  if(_bankTimer){ clearTimeout(_bankTimer); _bankTimer = null; }
  localStorage.removeItem('noor_state');
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  logEvent('🔄 Демо сброшено');
  render();
}

async function autoPlay(){
  resetSilent();
  const wait = ms => new Promise(r=>setTimeout(r,ms));
  createOrder(); await wait(2500);          // limit check auto-triggers inside
  supplierConfirm(); await wait(2500);      // bank purchase auto-triggers inside
  driverAccept(); await wait(1000);
  driverAtSupplier(); await wait(800);
  state.checklist={qty:true,quality:true,loaded:true}; render(); await wait(800);
  driverConfirmQabd(); await wait(1200);
  driverArrived(); await wait(1200);
  buyerScanQR(); await wait(1000);
  acceptMurabaha(); await wait(1500);
  qrSale(3000000); await wait(1000);
  qrSale(3000000); await wait(1000);
  qrSale(1000000);
}
function resetSilent(){
  if(_limitTimer){ clearTimeout(_limitTimer); _limitTimer = null; }
  if(_bankTimer){ clearTimeout(_bankTimer); _bankTimer = null; }
  localStorage.removeItem('noor_state');
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  render();
}

function switchTab(t){
  state.tab=t; save();
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('[data-app]').forEach(p=>{
    p.style.display = (window.innerWidth>900 || p.dataset.app===t) ? '' : 'none';
  });
}

function statusListHTML(){
  const s = state;
  const steps = [
    ['Заявка создана',                    s.orderCreated],
    ['Noor Core: проверка лимита',        s.limitChecking, s.fundsReserved || s.limitInsufficient],
    ['Лимит одобрен · средства резервированы', s.fundsReserved],
    ['Ожидаем подтверждение оптовика',    s.fundsReserved && s.orderStatus==='supplier_pending', s.supplierConfirmed],
    ['Товар подтверждён оптовиком',       s.supplierConfirmed],
    ['Банк выкупает товар у оптовика',    s.supplierConfirmed && !s.supplierPaid, s.supplierPaid],
    ['Товар — собственность Noor Bank',   s.supplierPaid],
    ['Назначена доставка',                s.driverAssigned],
    ['Водитель принял qabd/kabz',         s.qabdConfirmed],
    ['Товар в пути',                      s.inDelivery],
    ['Ожидаем QR-сканирование покупателя',s.arrivedAtBuyer && !s.qrScanned, s.qrScanned],
    ['Ожидаем акцепт Мурабахи',           s.qrScanned && !s.murabahaAccepted, s.murabahaAccepted],
    ['Мурабаха активна',                  s.murabahaAccepted],
    ['Погашение',                         s.repaid>0, s.fullyRepaid],
    ['Полностью погашено ✓',              s.fullyRepaid]
  ];
  let html = '<ul class="status-list">';
  steps.forEach(([txt,active,done])=>{
    let cls = '';
    if(done) cls='done';
    else if(active) cls='active';
    if(s.cancelled) cls = done?'done':(active?'cancelled':'');
    html += `<li class="${cls}">${txt}</li>`;
  });
  if(s.cancelled){
    const t = s.limitInsufficient ? 'Отменён: недостаточный лимит'
            : s.dispute==='supplier_no_stock' ? 'Отменён: нет товара у оптовика'
            : s.dispute==='driver_quality' ? 'Dispute: товар не соответствует'
            : 'Customer dispute';
    html += `<li class="cancelled">${t}</li>`;
  }
  html += '</ul>';
  return html;
}

        <div style="font-size:12px">С этого момента <b>банк фактически владеет товаром</b> и несёт риск до передачи клиенту. Вы — Wakil банка.</div>
      </div>
      <div style="text-align:center;font-weight:600;color:var(--green);margin:8px 0">📦 Товар в пути</div>
      <button class="btn" onclick="driverArrived()">Прибыл к покупателю</button>`;
    } else if(!s.murabahaAccepted && !s.cancelled){
      html += `<div class="sccp"><b>Ожидаем покупателя</b>Попросите покупателя отсканировать QR в Noor Marketplace для подтверждения приёмки и подписания Мурабахи.</div>
      <div class="qr"></div>
      <div class="muted" style="text-align:center;font-size:12px">
        ${s.qrScanned ? '✅ QR отсканирован · Ожидаем подписания договора...' : 'QR-код для подтверждения приёмки товара'}
      </div>`;
    } else if(s.murabahaAccepted){
      html += `<div class="card green" style="margin-top:8px">
        <h3>✅ Доставка завершена</h3>
        <div>Начислено: <b>${ORDER.delivery.toLocaleString('ru-RU')} сум</b></div>
      </div>
      <details><summary>История рейса</summary>
        <ul class="status-list" style="margin-top:6px">
          <li class="done">Принял задание</li>
          <li class="done">Прибыл к оптовику</li>
          <li class="done">Qabd зафиксирован (Wakil)</li>
          <li class="done">Прибыл к покупателю</li>
          <li class="done">Покупатель отсканировал QR</li>
          <li class="done">Мурабаха подписана клиентом</li>
        </ul>
      </details>`;
    }
    html += `</div>`;
  }

  document.getElementById('screen-delivery').innerHTML = html;
}

function renderSide(){
  const s = state;

  /* Timeline */
  let timelineHtml = '';
  const activeIdx = (()=>{
    for(let i=TIMELINE.length-1;i>=0;i--) if(timelineStatus(TIMELINE[i][0])) return Math.min(i+1,TIMELINE.length-1);
    return 0;
  })();
  TIMELINE.forEach(([k,t],i)=>{
    let cls = timelineStatus(k) ? 'done' : (i===activeIdx?'active':'');
    timelineHtml += `<li class="${cls}">${t}</li>`;
  });
  if(s.cancelled) timelineHtml += `<li style="color:var(--red);font-size:11.5px;padding:5px 0 5px 14px;border-left:2px solid var(--red);margin-left:5px">Order cancelled / Dispute</li>`;
  document.getElementById('timeline').innerHTML = timelineHtml;

  /* Ownership */
  const own = s.ownership;
  const rows = [
    ['supplier','🏭 Оптовик Food City', 'До оплаты банком'],
    ['bank','🏦 Noor Bank', 'После оплаты + qabd — риск на банке'],
    ['client','🛒 Клиент (Абдулло)', 'После подписания Мурабахи — долг активен'],
    ['closed','✅ Договор закрыт', 'После полного погашения']
  ];
  document.getElementById('ownership').innerHTML = rows.map(([k,who,d])=>
    `<div class="own-row ${own===k?'active':''}"><div class="who"><b>${who}</b><div style="font-size:11px;opacity:.85">${d}</div></div></div>`
  ).join('');

  /* #5 — Shariah Compliance panel */
  const sccpPoints = [
    {
      label:'SCCP-1 · Bank purchases before selling',
      desc:'Noor Bank купил товар у оптовика. Нет прямого займа клиенту.',
      pass: s.supplierPaid
    },
    {
      label:'SCCP-2 · Driver acts as Bank\'s Wakil',
      desc:'Водитель = агент банка. Банк владеет товаром при перевозке (Qabd).',
      pass: s.qabdConfirmed
    },
    {
      label:'SCCP-3 · Terms disclosed before contract',
      desc:'Условия Мурабахи показаны покупателю до подписания договора.',
      pass: s.qrScanned
    },
    {
      label:'SCCP-4 · Explicit buyer acceptance',
      desc:'Иджаб/Кабул: клиент явно принял условия. Долг начинается с этого момента.',
      pass: s.murabahaAccepted
    },
    {
      label:'SCCP-5 · Late payment = Charity, not Riba',
      desc:'Штраф за просрочку направляется в благотворительный фонд (садака).',
      pass: s.overdueActive || s.fullyRepaid
    }
  ];
  document.getElementById('shariah-panel').innerHTML = sccpPoints.map(p=>`
    <div class="sccp-item ${p.pass?'pass':''}">
      <div class="sccp-dot ${p.pass?'pass':''}">
        ${p.pass?'✓':'·'}
      </div>
      <div class="sccp-label">
        <b>${p.label}</b>
        <span>${p.desc}</span>
      </div>
    </div>`).join('');

  /* Event Log */
  document.getElementById('log').innerHTML = s.log.map(l=>`<div><span class="t">${l.t}</span>${l.msg}</div>`).join('')
    || '<div style="opacity:.5">Нет событий. Нажмите «Создать заказ» в Marketplace.</div>';
}

function render(){
  save();
  renderMarketplace();
  renderB2B();
  renderDelivery();
  renderSide();
}

if(state.log.length===0){
  logEvent('🟢 Demo started');
  logEvent('✓ Prescoring Paynet/Xolis: pre-approved 50 000 000 сум');
}
render();
switchTab(state.tab);
window.addEventListener('resize',()=>switchTab(state.tab));
</script>
</body>
</html>
