<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safa — Tez kunda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B1120;
      --card: #111827;
      --border: #1F2D42;
      --accent: #22C55E;
      --accent-soft: rgba(34,197,94,.12);
      --ink: #F1F5F9;
      --muted: #94A3B8;
      --muted2: #475569;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      font-size: 34px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    h1 span { color: var(--accent); }

    .sub {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 40px;
      font-style: italic;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .tag {
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 99px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .tag.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .badge {
      display: inline-block;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent);
      margin-bottom: 20px;
    }

    .back {
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      color: var(--muted2);
      text-decoration: none;
      margin-top: 48px;
      display: inline-block;
      transition: color .15s;
    }
    .back:hover { color: var(--muted); }

    .pitch-link {
      font-family: -apple-system, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      transition: opacity .15s;
    }
    .pitch-link:hover { opacity: .8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🕌</div>
    <div class="badge">Tez kunda</div>
    <h1>Safa — <span>Islomiy kundalik</span></h1>
    <p class="sub">
      Namoz vaqtlari, Qibla yo'nalishi, zikr, sadaqa, zakot va boshqa<br/>
      kundalik islomiy amallar uchun yagona platforma.
    </p>
    <div class="tags">
      <span class="tag active">🕐 Namoz vaqtlari</span>
      <span class="tag active">🧭 Qibla</span>
      <span class="tag active">📿 Zikr</span>
      <span class="tag active">💚 Sadaqa</span>
      <span class="tag active">📊 Zakot</span>
      <span class="tag">Ro'za</span>
      <span class="tag">Qur'on</span>
      <span class="tag">Hadis</span>
    </div>
    <a class="pitch-link" href="/prototypes/safa/pitch">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Founder Deck →
    </a>
  </div>
  <a class="back" href="/">← zoboto.uz ga qaytish</a>
</body>
</html>
